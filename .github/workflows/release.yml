name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Set release date
        shell: pwsh
        run: |
          "VITE_HOPS_RELEASE_DATE=$(Get-Date -AsUTC -Format 'yyyy-MM-dd')" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Hops ${{ env.RELEASE_TAG }}"
          releaseBody: "Download the Windows installer from the assets below."
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "hops[ext]"
          uploadUpdaterJson: true
          uploadUpdaterSignatures: false
          updaterJsonPreferNsis: true
